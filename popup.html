<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <h2>⚡ Anti Procrastinação</h2>

    <div class="input-group">
        <input type="text" id="siteInput" placeholder="Adicionar site">
        <div id="suggestions" class="suggestions"></div>
    </div>

    <button id="addBtn">Adicionar</button>

    <ul id="siteList"></ul>

    <h3>Mensagem personalizada</h3>
    <textarea id="customMessage"></textarea>
    <button id="saveMsgBtn">Salvar</button>

    <h3>Modo Hardcore</h3>

    <input type="password" id="passwordInput" placeholder="Definir senha">
    <button id="setPasswordBtn">Definir senha</button>

    <button id="toggleHardcoreBtn">Ativar Hardcore</button>

    <script src="popup.js"></script>
</body>

</html>
